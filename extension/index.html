<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Out</title>

    <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- ================================================================
       HEADER — greeting on the left
       ================================================================ -->
      <header>
        <div class="header-left">
          <!-- "Good afternoon" — written by getGreeting() in app.js -->
          <h1 id="greeting"></h1>
          <!-- "Friday, April 4, 2026" — written by getDateDisplay() in app.js -->
          <div class="date" id="dateDisplay"></div>
        </div>
        <!-- Sync-delete toggle: when ON, closing a tab in Tab Out also closes
         the real browser tab. Default OFF = only remove from the dashboard. -->
        <label
          class="sync-toggle"
          title="开启后,在 Tab Out 关闭标签页会同时关闭浏览器标签页"
        >
          <span class="sync-toggle-label">同步关闭浏览器标签</span>
          <span class="sync-switch">
            <input type="checkbox" id="syncCloseToggle" />
            <span class="sync-slider"></span>
          </span>
        </label>
      </header>

      <!-- ================================================================
       SEARCH BAR — search across all open tabs
       Typing filters into a flat list; clearing restores the grouped view
       ================================================================ -->
      <div class="search-bar" id="searchBar">
        <svg
          class="search-icon"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
          />
        </svg>
        <input
          type="text"
          id="tabSearch"
          placeholder="搜索打开的标签页..."
          autocomplete="off"
        />
        <button
          class="search-clear"
          id="searchClear"
          title="清除搜索"
          style="display: none"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18 18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <!-- Flat search results list — shown while searching -->
      <div
        class="search-results"
        id="searchResults"
        style="display: none"
      ></div>

      <!-- ================================================================
       TAB OUT DUPES BANNER — appears when you have extra Tab Out tabs open
       Hidden by default; app.js shows it when dupeTabOutCount > 1
       ================================================================ -->
      <div
        class="tab-cleanup-banner"
        id="tabOutDupeBanner"
        style="display: none"
      >
        <div class="tab-cleanup-left">
          <div class="tab-cleanup-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75"
              />
            </svg>
          </div>
          <div class="tab-cleanup-text">
            你打开了 <strong id="tabOutDupeCount"></strong> 个 Tab Out
            标签页。只保留这一个?
          </div>
        </div>
        <button class="tab-cleanup-btn" data-action="close-tabout-dupes">
          关闭多余的
        </button>
      </div>

      <!-- ================================================================
       MAIN CONTENT AREA — two-column layout
       Left: open tabs (domain/mission cards)
       Right: saved for later checklist
       The right column only renders when it has items (JS controls this)
       ================================================================ -->
      <div class="dashboard-columns" id="dashboardColumns">
        <!-- LEFT COLUMN: Custom groups + open tabs -->
        <div class="active-section" id="openTabsSection" style="display: none">
          <!-- Custom groups section — draggable tabs can be dropped here -->
          <div class="custom-groups" id="customGroups"></div>

          <div class="section-header">
            <h2 id="openTabsSectionTitle">现在</h2>
            <div class="section-line"></div>
            <div class="section-count" id="openTabsSectionCount"></div>
            <button class="new-group-btn" id="newGroupBtn" title="新建分组">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 4.5v15m7.5-7.5h-15"
                />
              </svg>
              新建分组
            </button>
          </div>
          <div class="missions" id="openTabsMissions"></div>
        </div>

        <!-- RIGHT COLUMN: Saved for Later checklist -->
        <div class="deferred-column" id="deferredColumn" style="display: none">
          <div class="section-header">
            <h2>稍后查看</h2>
            <div class="section-line"></div>
            <div class="section-count" id="deferredCount"></div>
          </div>

          <!-- Active checklist items — injected by renderDeferredList() in app.js -->
          <div class="deferred-list" id="deferredList"></div>

          <!-- Empty state — shown when no active deferred tabs -->
          <div class="deferred-empty" id="deferredEmpty" style="display: none">
            没有保存的内容。活在当下。
          </div>

          <!-- Archive section — collapsed by default -->
          <div
            class="deferred-archive"
            id="deferredArchive"
            style="display: none"
          >
            <button class="archive-toggle" id="archiveToggle">
              <svg
                class="archive-chevron"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="m19.5 8.25-7.5 7.5-7.5-7.5"
                />
              </svg>
              归档
              <span class="archive-count" id="archiveCount"></span>
            </button>
            <div class="archive-body" id="archiveBody" style="display: none">
              <input
                type="text"
                class="archive-search"
                id="archiveSearch"
                placeholder="搜索已归档的标签页..."
              />
              <div class="archive-list" id="archiveList"></div>
            </div>
          </div>
        </div>
      </div>
      <!-- end .dashboard-columns -->

      <!-- ================================================================
       FOOTER — global stats + refresh control
       ================================================================ -->
      <footer>
        <div class="footer-stats">
          <div class="stat">
            <div class="stat-num" id="statTabs">—</div>
            <div class="stat-label">打开的标签页</div>
          </div>
        </div>
        <div class="last-refresh">
          <span style="color: var(--muted); font-size: 11px"
            ><a
              href="https://github.com/rb05180518/tab-manager"
              target="_top"
              style="
                color: var(--muted);
                text-decoration: underline;
                text-underline-offset: 2px;
              "
              >Tab Out</a
            >
            by
            <a
              href="https://x.com/zarazhangrui"
              target="_top"
              style="
                color: var(--muted);
                text-decoration: underline;
                text-underline-offset: 2px;
              "
              >Zara</a
            ></span
          >
        </div>
      </footer>
    </div>
    <!-- end .container -->

    <!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
    <div class="toast" id="toast">
      <!-- Checkmark circle icon (Heroicons outline) -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
        />
      </svg>
      <span id="toastText"></span>
    </div>

    <!-- ================================================================
     CONFIRM DIALOG — second confirmation for destructive actions
     Hidden by default; app.js shows it via confirmAction()
     ================================================================ -->
    <div class="confirm-overlay" id="confirmOverlay" style="display: none">
      <div class="confirm-dialog">
        <div class="confirm-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
            />
          </svg>
        </div>
        <div class="confirm-message" id="confirmMessage"></div>
        <div class="confirm-actions">
          <button class="confirm-btn confirm-cancel" id="confirmCancel">
            取消
          </button>
          <button class="confirm-btn confirm-danger" id="confirmOk">
            确认
          </button>
        </div>
      </div>
    </div>

    <!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
    <!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
    <script
      src="config.local.js"
      onerror="/* no personal config, that's fine */"
    ></script>

    <!-- Main dashboard logic — loads last so the DOM is ready -->
    <script src="app.js"></script>
  </body>
</html>
